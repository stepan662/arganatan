name: Release

on:
  workflow_run:
    workflows: ['Test']
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build library
        run: pnpm build

      - name: Get version before release
        id: pre_release
        run: echo "version=$(node -p "require('./lib/package.json').version")" >> $GITHUB_OUTPUT

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: npx semantic-release

      - name: Get version after release
        id: post_release
        run: echo "version=$(node -p "require('./lib/package.json').version")" >> $GITHUB_OUTPUT

      - name: Copy docs to package
        if: steps.pre_release.outputs.version != steps.post_release.outputs.version
        run: cp README.md LICENSE CHANGELOG.md lib/

      - name: Publish to npm
        if: steps.pre_release.outputs.version != steps.post_release.outputs.version
        working-directory: lib
        run: npm publish --provenance --access public
